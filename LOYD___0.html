<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر لويد</title>
    <style>
        :root {
            --primary-color: #000;
            --accent-color: #e91e63;
            --bg-gray: #f4f4f4;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg-gray); color: #333; overflow-x: hidden; }
        
        /* الهيدر والقائمة */
        .header { background: var(--primary-color); color: #fff; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .nav { background: #fff; padding: 12px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-around; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav span { cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
        .nav span:hover { color: var(--accent-color); }

        /* الشبكة والبطاقة */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; }
        .product-card { background: #fff; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s; }
        .product-card img { width: 100%; height: 240px; object-fit: cover; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
        
        .product-info { padding: 12px; }
        .product-info h4 { margin: 5px 0; font-size: 0.9rem; }
        .price { color: var(--accent-color); font-weight: bold; font-size: 1.1rem; }
        
        /* الأزرار */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        .btn-cart { background: #eee; color: #333; }
        .btn-buy { background: var(--primary-color); color: #fff; }

        .discount-badge { position: absolute; top: 10px; right: 10px; background: var(--accent-color); color: #fff; padding: 3px 10px; font-size: 11px; border-radius: 20px; font-weight: bold; z-index: 10; }
        
        /* أيقونة السلة العائمة */
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--accent-color); color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(233, 30, 99, 0.4); cursor: pointer; z-index: 1000; }
        .cart-count { position: absolute; top: 0; right: 0; background: #000; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        /* نافذة السلة (Side Menu) */
        .cart-sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #fff; z-index: 2000; transition: 0.4s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .cart-sidebar.active { left: 0; }
        .cart-header { background: #000; color: #fff; padding: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding: 10px 0; }
        .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .cart-footer { padding: 20px; border-top: 1px solid #eee; }
        .total-price { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .btn-checkout { width: 100%; padding: 15px; background: var(--accent-color); color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="header">متجر LUYD </div>

<div class="nav">
    <span>الكل</span>
    <span>وصل حديثاً</span>
    <span>تخفيضات</span>
</div>

<div class="product-grid" id="product-container"></div>

<div class="cart-float" onclick="toggleCart()">
    🛒 <span class="cart-count" id="cart-count">0</span>
</div>

<div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <span>سلة المشتريات</span>
        <span style="cursor:pointer" onclick="toggleCart()">✕</span>
    </div>
    <div class="cart-items" id="cart-items">
        <p style="text-align:center; color:#777;">السلة فارغة حالياً</p>
    </div>
    <div class="cart-footer">
        <div class="total-price">
            <span>الإجمالي:</span>
            <span id="total-amount">0 SAR</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">إتمام الطلب</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "فستان سهرة فاخر", price: 150, img: "https://i.ibb.co/3VQM8X1/74699c8fc9c0ab0757267807f41d7b73.jpg", discount: "-20%" },
        { id: 2, name: "طقم كاجوال عصري", price: 85, img: "https://i.ibb.co/bnRnwXn/f327593cbe6cf7946abfb1b1fec8c70c.jpg", discount: "-15%" },
        { id: 3, name: "حقيبة يد جلدية", price: 210, img: "https://i.ibb.co/v6YwVhKR/e6c0654ac4b9cd29e17bdae9b754be1a.jpg", discount: "-30%" },
        { id: 4, name: "حذاء رياضي برو", price: 120, img: "https://i.ibb.co/zT5VNXBb/e8608d0f5a1794a38366aa7e4cebcad8.jpg", discount: "-10%" }
    ];

    let cart = [];

    // عرض المنتجات
    function renderProducts() {
        const container = document.getElementById('product-container');
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="discount-badge">${p.discount}</div>
                <img src="${p.img}" alt="${p.name}">
                <div class="product-info">
                    <h4>${p.name}</h4>
                    <span class="price">${p.price} SAR</span>
                    <div class="actions">
                        <button class="btn btn-cart" onclick="addToCart(${p.id})">السلة</button>
                        <button class="btn btn-buy" onclick="quickBuy(${p.id})">شراء</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // إضافة للسلة
    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        updateCart();
    }

    // شراء سريع
    function quickBuy(id) {
        const product = products.find(p => p.id === id);
        alert(`جاري توجيهك لصفحة الدفع لمنتج: ${product.name}`);
    }

    // تحديث السلة
    function updateCart() {
        const cartCount = document.getElementById('cart-count');
        const cartItemsContainer = document.getElementById('cart-items');
        const totalAmount = document.getElementById('total-amount');

        cartCount.innerText = cart.length;

        if (cart.length === 0) {
            cartItemsContainer.innerHTML = '<p style="text-align:center; color:#777;">السلة فارغة حالياً</p>';
            totalAmount.innerText = `0 SAR`;
            return;
        }

        cartItemsContainer.innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <img src="${item.img}">
                <div style="flex:1">
                    <div style="font-weight:bold; font-size:0.8rem">${item.name}</div>
                    <div style="color:var(--accent-color)">${item.price} SAR</div>
                </div>
                <span style="color:red; cursor:pointer" onclick="removeFromCart(${index})">🗑️</span>
            </div>
        `).join('');

        const total = cart.reduce((sum, item) => sum + item.price, 0);
        totalAmount.innerText = `${total} SAR`;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('active');
    }

    function checkout() {
        if (cart.length === 0) return alert("السلة فارغة!");
        alert("تم استلام طلبك بنجاح! سيتم تحويلك لبوابة الدفع.");
        cart = [];
        updateCart();
        toggleCart();
    }

    renderProducts();
</script>
</body>
</html>
